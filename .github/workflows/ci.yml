name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: restaurant
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U app -d restaurant"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_DATABASE_URL: postgresql+asyncpg://app:app@localhost:5433/restaurant
      APP_REDIS_URL: redis://localhost:6380/0
      APP_JWT_SECRET: ci-secret-32-bytes-long-enough-x
      APP_WA_VERIFY_TOKEN: ci-verify-token
      APP_LLM_PROVIDER: fake
      APP_WHATSAPP_PROVIDER: mock
      APP_GEO_PROVIDER: fake

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python3.12 -m pip install -e ".[dev]"

      - name: Create test database
        run: |
          PGPASSWORD=app psql -h localhost -p 5433 -U app -d postgres \
            -c "CREATE DATABASE restaurant_test;" || true

      - name: Run tests (deprecation-strict)
        run: pytest -W error::DeprecationWarning -q

      - name: Lint
        run: ruff check src apps tests
