services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: restaurant
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d restaurant"]
      interval: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
