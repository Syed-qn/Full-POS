<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>WhatsApp Simulator — Restaurant Platform</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #d2dbd4; display: flex; justify-content: center;
  }
  #app {
    width: 100%; max-width: 480px; height: 100vh;
    display: flex; flex-direction: column; background: #e5ddd5;
  }
  header {
    background: #075e54; color: #fff; padding: 10px 14px;
    font-size: 15px; font-weight: 600; flex: 0 0 auto;
  }
  #status {
    font-family: monospace; font-size: 12px; padding: 4px 14px;
    color: #b00020; background: #fff3f3; min-height: 0; display: none;
  }
  #status.show { display: block; }
  #config {
    display: flex; gap: 8px; padding: 8px 10px; background: #f6f6f6;
    border-bottom: 1px solid #ddd; flex: 0 0 auto;
  }
  #config label { display: flex; flex-direction: column; font-size: 11px; color: #555; flex: 1; }
  #config input {
    font-family: monospace; font-size: 13px; padding: 5px 6px;
    border: 1px solid #ccc; border-radius: 5px; margin-top: 2px;
  }
  #messages {
    flex: 1 1 auto; overflow-y: auto; padding: 12px 10px;
    background-color: #e5ddd5;
    background-image:
      radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 22px 22px; background-position: 0 0, 11px 11px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .bubble {
    max-width: 78%; padding: 7px 10px; border-radius: 8px;
    font-size: 14px; line-height: 1.35; white-space: pre-wrap;
    word-wrap: break-word; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
    position: relative;
  }
  .sent { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 2px; }
  .recv { align-self: flex-start; background: #fff; border-top-left-radius: 2px; }
  .ts { display: block; font-size: 10px; color: #888; text-align: right; margin-top: 3px; }
  footer {
    display: flex; gap: 8px; padding: 8px; background: #f0f0f0;
    border-top: 1px solid #ddd; flex: 0 0 auto;
  }
  footer textarea {
    flex: 1; resize: none; border: 1px solid #ccc; border-radius: 18px;
    padding: 9px 14px; font-size: 14px; font-family: inherit;
    max-height: 100px; line-height: 1.3;
  }
  footer button {
    background: #075e54; color: #fff; border: none; border-radius: 50%;
    width: 44px; height: 44px; font-size: 18px; cursor: pointer; flex: 0 0 auto;
  }
  footer button:active { background: #054c43; }
</style>
</head>
<body>
<div id="app">
  <header>WhatsApp Simulator — Restaurant Platform</header>
  <div id="status"></div>
  <div id="config">
    <label>Your phone
      <input id="fromPhone" value="+971509876543" />
    </label>
    <label>Restaurant phone
      <input id="restPhone" value="+97141234567" />
    </label>
  </div>
  <div id="messages"></div>
  <footer>
    <textarea id="input" rows="1" placeholder="Type a message"></textarea>
    <button id="send" title="Send">&#10148;</button>
  </footer>
</div>

<script>
(function () {
  var msgs = document.getElementById("messages");
  var input = document.getElementById("input");
  var sendBtn = document.getElementById("send");
  var statusBar = document.getElementById("status");
  var seen = {};        // wa_message_id -> true
  var seq = 0;          // fallback de-dupe for replies without an id

  function setError(msg) {
    if (msg) { statusBar.textContent = msg; statusBar.classList.add("show"); }
    else { statusBar.textContent = ""; statusBar.classList.remove("show"); }
  }

  function now() {
    var d = new Date();
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function addBubble(text, cls) {
    var b = document.createElement("div");
    b.className = "bubble " + cls;
    var span = document.createElement("span");
    span.textContent = text;
    var ts = document.createElement("span");
    ts.className = "ts";
    ts.textContent = now();
    b.appendChild(span);
    b.appendChild(ts);
    msgs.appendChild(b);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function send() {
    var text = input.value.trim();
    if (!text) return;
    var body = {
      from_phone: document.getElementById("fromPhone").value.trim(),
      restaurant_phone: document.getElementById("restPhone").value.trim(),
      text: text
    };
    addBubble(text, "sent");
    input.value = "";
    input.style.height = "auto";
    fetch("/simulator/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    })
    .then(function (r) { if (!r.ok) throw new Error("bad status"); setError(""); })
    .catch(function () { setError("Failed to reach server"); });
    setTimeout(poll, 300);
    setTimeout(poll, 1200);
  }

  function poll() {
    fetch("/simulator/messages")
      .then(function (r) { if (!r.ok) throw new Error("bad status"); return r.json(); })
      .then(function (arr) {
        setError("");
        (arr || []).forEach(function (m) {
          var key = m.wa_message_id || ("seq-" + (seq++));
          if (seen[key]) return;
          seen[key] = true;
          var payload = m.payload || {};
          var text = payload.body != null ? payload.body : "";
          addBubble(text, "recv");
        });
      })
      .catch(function () { setError("Failed to reach server"); });
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener("input", function () {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 100) + "px";
  });

  poll();
  setInterval(poll, 3000);
})();
</script>
</body>
</html>
