<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>WhatsApp Simulator — Restaurant Platform</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #d2dbd4; display: flex; justify-content: center;
  }
  #app {
    width: 100%; max-width: 480px; height: 100vh;
    display: flex; flex-direction: column; background: #e5ddd5;
  }
  header {
    background: #075e54; color: #fff; padding: 10px 14px;
    font-size: 15px; font-weight: 600; flex: 0 0 auto;
  }
  #status {
    font-family: monospace; font-size: 12px; padding: 4px 14px;
    color: #b00020; background: #fff3f3; min-height: 0; display: none;
  }
  #status.show { display: block; }
  #config {
    display: flex; gap: 8px; padding: 8px 10px; background: #f6f6f6;
    border-bottom: 1px solid #ddd; flex: 0 0 auto;
  }
  #config label { display: flex; flex-direction: column; font-size: 11px; color: #555; flex: 1; }
  #config input {
    font-family: monospace; font-size: 13px; padding: 5px 6px;
    border: 1px solid #ccc; border-radius: 5px; margin-top: 2px;
  }
  #messages {
    flex: 1 1 auto; overflow-y: auto; padding: 12px 10px;
    background-color: #e5ddd5;
    background-image:
      radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 22px 22px; background-position: 0 0, 11px 11px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .bubble {
    max-width: 78%; padding: 7px 10px; border-radius: 8px;
    font-size: 14px; line-height: 1.35; white-space: pre-wrap;
    word-wrap: break-word; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
    position: relative;
  }
  .sent { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 2px; }
  .recv { align-self: flex-start; background: #fff; border-top-left-radius: 2px; }
  .ts { display: block; font-size: 10px; color: #888; text-align: right; margin-top: 3px; }
  .chips { align-self: flex-start; display: flex; flex-wrap: wrap; gap: 6px; max-width: 78%; }
  .chip {
    background: #fff; color: #075e54; border: 1px solid #cfe9df;
    border-radius: 16px; padding: 6px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
  }
  .chip:active { background: #eafaf3; }
  .hint {
    align-self: flex-start; font-size: 12px; color: #555; font-style: italic;
    background: #fff8e1; border: 1px dashed #e0c97f; border-radius: 6px;
    padding: 5px 9px; max-width: 78%;
  }
  .media-bubble img {
    max-width: 100%; border-radius: 6px; display: block;
  }
  .media-bubble .caption {
    font-size: 12px; color: #555; margin-top: 4px;
  }
  .doc-bubble a {
    color: #075e54; text-decoration: none; font-weight: 600;
  }
  .doc-bubble a:hover { text-decoration: underline; }
  #locrow {
    display: none; gap: 6px; padding: 6px 10px; background: #eef4f1;
    border-top: 1px solid #ddd; align-items: flex-end; flex: 0 0 auto;
  }
  #locrow.show { display: flex; }
  #locrow label { display: flex; flex-direction: column; font-size: 10px; color: #555; flex: 1; }
  #locrow input {
    font-family: monospace; font-size: 13px; padding: 5px 6px;
    border: 1px solid #ccc; border-radius: 5px; margin-top: 2px;
  }
  #locrow button {
    background: #075e54; color: #fff; border: none; border-radius: 16px;
    padding: 8px 12px; font-size: 13px; cursor: pointer; flex: 0 0 auto;
  }
  footer {
    display: flex; gap: 8px; padding: 8px; background: #f0f0f0;
    border-top: 1px solid #ddd; flex: 0 0 auto;
  }
  footer textarea {
    flex: 1; resize: none; border: 1px solid #ccc; border-radius: 18px;
    padding: 9px 14px; font-size: 14px; font-family: inherit;
    max-height: 100px; line-height: 1.3;
  }
  footer button {
    background: #075e54; color: #fff; border: none; border-radius: 50%;
    width: 44px; height: 44px; font-size: 18px; cursor: pointer; flex: 0 0 auto;
  }
  footer button:active { background: #054c43; }
  #locToggle { background: #128c7e; }
  #locToggle.active { background: #054c43; }
</style>
</head>
<body>
<div id="app">
  <header>WhatsApp Simulator — Restaurant Platform</header>
  <div id="status"></div>
  <div id="config">
    <label>Your phone
      <input id="fromPhone" value="+971509876543" />
    </label>
    <label>Restaurant phone
      <input id="restPhone" value="+97141234567" />
    </label>
  </div>
  <div id="messages"></div>
  <div id="locrow">
    <label>Latitude
      <input id="lat" value="25.2048" />
    </label>
    <label>Longitude
      <input id="lng" value="55.2708" />
    </label>
    <button id="sendLoc" title="Send this location pin">Send pin</button>
  </div>
  <footer>
    <button id="locToggle" title="Send location">&#128205;</button>
    <textarea id="input" rows="1" placeholder="Type a message"></textarea>
    <button id="send" title="Send">&#10148;</button>
  </footer>
</div>

<script>
(function () {
  var msgs = document.getElementById("messages");
  var input = document.getElementById("input");
  var sendBtn = document.getElementById("send");
  var statusBar = document.getElementById("status");
  var seen = {};        // wa_message_id -> true
  var seq = 0;          // fallback de-dupe for replies without an id

  function setError(msg) {
    if (msg) { statusBar.textContent = msg; statusBar.classList.add("show"); }
    else { statusBar.textContent = ""; statusBar.classList.remove("show"); }
  }

  function now() {
    var d = new Date();
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function addBubble(text, cls) {
    var b = document.createElement("div");
    b.className = "bubble " + cls;
    var span = document.createElement("span");
    span.textContent = text;
    var ts = document.createElement("span");
    ts.className = "ts";
    ts.textContent = now();
    b.appendChild(span);
    b.appendChild(ts);
    msgs.appendChild(b);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addHint(text) {
    var h = document.createElement("div");
    h.className = "hint";
    h.textContent = text;
    msgs.appendChild(h);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addChips(buttons) {
    var row = document.createElement("div");
    row.className = "chips";
    (buttons || []).forEach(function (btn) {
      var chip = document.createElement("button");
      chip.className = "chip";
      chip.type = "button";
      chip.textContent = btn.title;
      chip.addEventListener("click", function () {
        row.remove();
        sendPayload({ button_reply: { id: btn.id, title: btn.title } }, "▸ " + btn.title);
      });
      row.appendChild(chip);
    });
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function baseBody() {
    return {
      from_phone: document.getElementById("fromPhone").value.trim(),
      restaurant_phone: document.getElementById("restPhone").value.trim()
    };
  }

  // Post a send payload (text / button_reply / location) with an optimistic bubble.
  function sendPayload(extra, optimisticText) {
    var body = baseBody();
    for (var k in extra) { body[k] = extra[k]; }
    if (optimisticText) addBubble(optimisticText, "sent");
    fetch("/simulator/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    })
    .then(function (r) { if (!r.ok) throw new Error("bad status"); setError(""); })
    .catch(function () { setError("Failed to reach server"); });
    setTimeout(poll, 300);
    setTimeout(poll, 1200);
  }

  function send() {
    var text = input.value.trim();
    if (!text) return;
    input.value = "";
    input.style.height = "auto";
    sendPayload({ text: text }, text);
  }

  function sendLocation() {
    var lat = parseFloat(document.getElementById("lat").value);
    var lng = parseFloat(document.getElementById("lng").value);
    if (isNaN(lat) || isNaN(lng)) { setError("Latitude/longitude must be numbers"); return; }
    sendPayload(
      { location: { latitude: lat, longitude: lng } },
      "📍 " + lat.toFixed(4) + ", " + lng.toFixed(4)
    );
  }

  function poll() {
    fetch("/simulator/messages")
      .then(function (r) { if (!r.ok) throw new Error("bad status"); return r.json(); })
      .then(function (arr) {
        setError("");
        (arr || []).forEach(function (m) {
          var key = m.wa_message_id || ("seq-" + (seq++));
          if (seen[key]) return;
          seen[key] = true;
          var payload = m.payload || {};
          var type = (m.type || "").toLowerCase();
          if (type === "image") {
            var imgWrap = document.createElement("div");
            imgWrap.className = "bubble recv media-bubble";
            var img = document.createElement("img");
            img.src = "data:" + payload.content_type + ";base64," + payload.data;
            imgWrap.appendChild(img);
            if (payload.caption) {
              var cap = document.createElement("span");
              cap.className = "caption";
              cap.textContent = payload.caption;
              imgWrap.appendChild(cap);
            }
            var ts = document.createElement("span");
            ts.className = "ts"; ts.textContent = now();
            imgWrap.appendChild(ts);
            msgs.appendChild(imgWrap);
            msgs.scrollTop = msgs.scrollHeight;
          } else if (type === "document") {
            var docWrap = document.createElement("div");
            docWrap.className = "bubble recv doc-bubble";
            var link = document.createElement("a");
            link.textContent = "📄 " + (payload.filename || payload.caption || "Document");
            if (payload.data && payload.content_type) {
              link.href = "data:" + payload.content_type + ";base64," + payload.data;
              link.download = payload.filename || "menu.pdf";
            } else if (payload.url) {
              link.href = payload.url; link.target = "_blank";
            }
            var ts2 = document.createElement("span");
            ts2.className = "ts"; ts2.textContent = now();
            docWrap.appendChild(link);
            docWrap.appendChild(ts2);
            msgs.appendChild(docWrap);
            msgs.scrollTop = msgs.scrollHeight;
          } else {
            var text = payload.body != null ? payload.body : "";
            if (text) addBubble(text, "recv");
          }
          if (type.indexOf("buttons") !== -1 && payload.buttons) {
            addChips(payload.buttons);
          }
          if (type.indexOf("location_request") !== -1) {
            addHint("📍 Tap the location button below to share your delivery pin.");
          }
        });
      })
      .catch(function () { setError("Failed to reach server"); });
  }

  var locRow = document.getElementById("locrow");
  var locToggle = document.getElementById("locToggle");
  locToggle.addEventListener("click", function () {
    locRow.classList.toggle("show");
    locToggle.classList.toggle("active");
  });
  document.getElementById("sendLoc").addEventListener("click", sendLocation);

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener("input", function () {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 100) + "px";
  });

  poll();
  setInterval(poll, 3000);
})();
</script>
</body>
</html>
