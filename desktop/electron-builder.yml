appId: com.catalystiq.fullpos.desktop
productName: Full POS
directories:
  output: dist_installer
  buildResources: build
files:
  - dist/main/**/*
extraResources:
  # dist-electron (not dist/) — built via `npm run build:electron` in frontend/,
  # which sets base: "./" so asset paths resolve correctly under Electron's
  # file:// loading. The plain `dist/` build (base: "/") is for the hosted web
  # deployment and renders BLANK under file:// (absolute "/assets/..." paths
  # resolve against the filesystem root, not index.html's directory).
  - from: "../frontend/dist-electron"
    to: "frontend/dist"
win:
  target: nsis
  artifactName: "FullPOS-Setup-${version}.exe"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
# Auto-update feed: restaurants' installed .exes poll this URL for new releases
# (electron-updater, wired in src/main/updater.ts). Set POS_UPDATE_URL at build
# time once a real update host is chosen (S3/generic HTTP/GitHub Releases) — a
# generic HTTP host just needs the built installer + the auto-generated
# latest.yml uploaded after each release. electron-builder ERRORS (not a soft
# no-op) if POS_UPDATE_URL is unset when this config is read — always export a
# value (even a placeholder) when building locally/in CI before that's decided.
publish:
  provider: generic
  url: "${env.POS_UPDATE_URL}"
