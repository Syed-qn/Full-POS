# Prometheus scrape configuration for the Restaurant WhatsApp Platform.
#
# Pairs with Phase 7 Task 10 (src/app/obs/metrics.py + GET /metrics on the api
# service). The api container exposes an UNAUTHENTICATED /metrics endpoint on
# port 8000 that is intentionally NOT host-published (docs/observability.md) —
# only this in-cluster Prometheus may scrape it.
#
# Metric names this config harvests (defined by P7-T10):
#   http_requests_total{method,path,status}        (Counter)
#   http_request_duration_seconds{method,path}     (Histogram)
#   outbox_deliveries_total{result}                (Counter: sent|failed|dead)
#   sla_breaches_total{restaurant_id}              (Counter)
#   rate_limit_rejections_total{scope}             (Counter: auth|webhook)

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: restaurant-whatsapp
    env: prod

# Alert rules live alongside this file; load them when alerting is wired up.
# (Suggested rules documented in docs/observability.md — paste into rules.yml
#  and uncomment the rule_files block + an Alertmanager target below.)
# rule_files:
#   - /etc/prometheus/rules.yml

scrape_configs:
  # The FastAPI application instance(s). Service name `api` resolves on the
  # docker-compose network; /metrics is plain-text exposition format.
  - job_name: restaurant-api
    metrics_path: /metrics
    scheme: http
    scrape_interval: 15s
    static_configs:
      - targets:
          - api:8000
        labels:
          service: api

  # Prometheus scraping itself, for meta-monitoring (scrape health, TSDB size).
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus
